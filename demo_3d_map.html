<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LocalPulse – WOW-Effect Demo</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  <script src="config.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #111; font-family: 'Segoe UI', sans-serif; }
    #map { position: absolute; inset: 0; }

    /* ── Context Sensing Card ───────────────────────────────────────────────── */
    #context-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(12, 12, 18, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px 28px;
      color: white;
      z-index: 20;
      width: 92%;
      max-width: 360px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,138,0,0.08);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #context-card.hide {
      opacity: 0;
      transform: translate(-50%, -58%);
      pointer-events: none;
    }

    .ctx-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #aaa;
      letter-spacing: 0.5px;
    }
    .ctx-header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff8a00;
      box-shadow: 0 0 8px #ff8a00;
      animation: dotPulse 1.2s ease infinite;
      flex-shrink: 0;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    .ctx-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      opacity: 0;
      animation: rowSlideIn 0.4s ease forwards;
    }
    .ctx-row:last-child { border-bottom: none; }
    .ctx-row:nth-child(2) { animation-delay: 0.05s; }
    .ctx-row:nth-child(3) { animation-delay: 0.15s; }
    .ctx-row:nth-child(4) { animation-delay: 0.25s; }
    .ctx-row:nth-child(5) { animation-delay: 0.35s; }
    @keyframes rowSlideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .ctx-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
    .ctx-label { font-size: 13px; color: #888; flex: 1; }

    .ctx-right {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 120px;
      justify-content: flex-end;
    }

    .ctx-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,138,0,0.2);
      border-top-color: #ff8a00;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ctx-check {
      display: none;
      width: 18px; height: 18px;
      background: linear-gradient(135deg, #ff8a00, #e52e71);
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      flex-shrink: 0;
      animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .ctx-value {
      font-size: 12px;
      font-weight: 600;
      color: #eee;
      text-align: right;
      opacity: 0;
      transition: opacity 0.4s ease;
      max-width: 110px;
      line-height: 1.3;
    }
    .ctx-value.visible { opacity: 1; }

    /* ── Route info card ────────────────────────────────────────────────────── */
    #route-info {
      display: none;
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(12, 12, 18, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,138,0,0.35);
      border-radius: 18px;
      padding: 14px 28px;
      color: white;
      z-index: 10;
      text-align: center;
      box-shadow: 0 0 24px rgba(255,138,0,0.15);
      animation: fadeDown 0.5s ease;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translate(-50%, -12px); }
      to   { opacity: 1; transform: translateX(-50%); }
    }
    #route-info .ri-label { font-size: 10px; color: #666; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
    #route-info .ri-value {
      font-size: 26px; font-weight: 800;
      background: linear-gradient(90deg, #ff8a00, #e52e71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    #route-info .ri-sub { font-size: 12px; color: #777; margin-top: 4px; }

    /* ── GenUI offer widget ─────────────────────────────────────────────────── */
    #gen-ui-widget {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translate(-50%, 180%);   /* starts hidden below screen */
      background: rgba(12, 12, 18, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 22px;
      border-radius: 22px;
      color: white;
      z-index: 10;
      width: 92%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      transition: transform 0.7s cubic-bezier(0.34, 1.3, 0.64, 1);
    }
    #gen-ui-widget.visible { transform: translateX(-50%); }
    #gen-ui-widget.hide    { transform: translate(-50%, 180%); }

    #gen-ui-widget h2 {
      margin: 0 0 8px;
      font-size: 22px;
      background: linear-gradient(90deg, #ff8a00, #e52e71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #gen-ui-widget p { margin: 0 0 18px; color: #bbb; font-size: 14px; line-height: 1.5; }

    .btn {
      background: linear-gradient(90deg, #ff8a00, #e52e71);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 30px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      box-shadow: 0 4px 20px rgba(229, 46, 113, 0.4);
      transition: transform 0.15s, opacity 0.2s;
    }
    .btn:active   { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: #888;
      margin-top: 10px;
      box-shadow: none;
    }

    /* ── WowEffect marker styles ────────────────────────────────────────────── */
    .lp-user-marker {
      width: 20px; height: 20px;
      background: #4dabf7;
      border: 3px solid white;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      animation: lp-user-pulse 2s infinite;
    }
    @keyframes lp-user-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(77,171,247,0.5); }
      70%     { box-shadow: 0 0 0 16px rgba(77,171,247,0); }
    }

    .lp-pulse-marker {
      width: 15px; height: 15px;
      background: #00ffcc;
      border-radius: 50%;
      box-shadow: 0 0 10px #00ffcc;
      animation: lp-pulse 1.5s infinite;
    }
    @keyframes lp-pulse {
      0%,100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0,255,204,0.7); }
      70%     { transform: scale(1);    box-shadow: 0 0 0 20px rgba(0,255,204,0); }
    }

    .lp-target-marker {
      width: 36px; height: 36px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff8a00"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>');
      background-size: cover;
      filter: drop-shadow(0 0 6px rgba(255,138,0,0.8));
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Context Sensing Card -->
  <div id="context-card">
    <div class="ctx-header">
      <div class="ctx-header-dot"></div>
      LocalPulse scannt deinen Kontext…
    </div>

    <div class="ctx-row" id="ctx-time">
      <span class="ctx-icon">🕐</span>
      <span class="ctx-label">Uhrzeit</span>
      <div class="ctx-right">
        <div class="ctx-spinner"></div>
        <div class="ctx-check">✓</div>
        <span class="ctx-value"></span>
      </div>
    </div>

    <div class="ctx-row" id="ctx-location">
      <span class="ctx-icon">📍</span>
      <span class="ctx-label">Standort</span>
      <div class="ctx-right">
        <div class="ctx-spinner"></div>
        <div class="ctx-check">✓</div>
        <span class="ctx-value"></span>
      </div>
    </div>

    <div class="ctx-row" id="ctx-weather">
      <span class="ctx-icon">🌤️</span>
      <span class="ctx-label">Wetter</span>
      <div class="ctx-right">
        <div class="ctx-spinner"></div>
        <div class="ctx-check">✓</div>
        <span class="ctx-value"></span>
      </div>
    </div>

    <div class="ctx-row" id="ctx-distance">
      <span class="ctx-icon">📏</span>
      <span class="ctx-label">Nächstes Angebot</span>
      <div class="ctx-right">
        <div class="ctx-spinner"></div>
        <div class="ctx-check">✓</div>
        <span class="ctx-value"></span>
      </div>
    </div>
  </div>

  <!-- Route info (appears after WOW flight) -->
  <div id="route-info">
    <div class="ri-label">Zu Fuß</div>
    <div class="ri-value" id="route-duration">—</div>
    <div class="ri-sub" id="route-distance">—</div>
  </div>

  <!-- Offer widget (slides up after context checks) -->
  <div id="gen-ui-widget">
    <h2 id="offer-title">⚡ Angebot in der Nähe!</h2>
    <p id="offer-desc">20% auf dein Spaghettieis bei Danny's. Nur für die nächsten 15 Minuten.</p>
    <button class="btn" id="btn-accept">Angebot annehmen &amp; Route zeigen</button>
    <button class="btn btn-secondary" id="btn-reset" style="display:none">Zurück zur Übersicht</button>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // WowEffect (inlined from src/WowEffect.js for file:// compatibility)
    // ─────────────────────────────────────────────────────────────────────────
    class WowEffect {
      constructor({ container, mapboxToken, startLngLat, onReady, onFlightComplete }) {
        mapboxgl.accessToken = mapboxToken;
        this._startLngLat = startLngLat;
        this._onFlightComplete = onFlightComplete;
        this._markers = [];
        this._userMarker = null;

        this._map = new mapboxgl.Map({
          container,
          style: 'mapbox://styles/mapbox/satellite-streets-v12',
          center: startLngLat,
          zoom: 14,
          pitch: 0,
          bearing: 0,
          antialias: true,
        });

        this._map.on('style.load', () => {
          this._add3DBuildings();
          onReady && onReady();
        });
      }

      updateUserLocation(lngLat) {
        this._startLngLat = lngLat;
        if (this._userMarker) {
          this._userMarker.setLngLat(lngLat);
        } else {
          const el = document.createElement('div');
          el.className = 'lp-user-marker';
          this._userMarker = new mapboxgl.Marker(el).setLngLat(lngLat).addTo(this._map);
        }
        this._map.flyTo({ center: lngLat, zoom: 15, duration: 1200 });
      }

      trigger({ targetLngLat, socialProofCoords = [], flightDuration = 4000 }) {
        this._clearOfferMarkers();
        this._map.flyTo({
          center: targetLngLat, zoom: 17.5,
          pitch: 65, bearing: -20,
          duration: flightDuration, essential: true,
        });
        setTimeout(() => {
          this._addTargetMarker(targetLngLat);
          this._addSocialProofMarkers(socialProofCoords);
          this._onFlightComplete && this._onFlightComplete();
        }, flightDuration);
      }

      async showRoute({ from, to }) {
        const url =
          `https://api.mapbox.com/directions/v5/mapbox/walking/` +
          `${from[0]},${from[1]};${to[0]},${to[1]}` +
          `?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;
        const res  = await fetch(url);
        const data = await res.json();
        const route = data.routes[0];
        this._drawRoute(route.geometry);
        this._fitRoute(route.geometry.coordinates);
        return { distance: route.distance, duration: route.duration };
      }

      reset() {
        this._clearOfferMarkers();
        this._removeRoute();
        this._map.flyTo({ center: this._startLngLat, zoom: 15, pitch: 0, bearing: 0, duration: 2000 });
      }

      destroy() {
        this._clearOfferMarkers();
        if (this._userMarker) this._userMarker.remove();
        this._removeRoute();
        this._map.remove();
      }

      _add3DBuildings() {
        const layers     = this._map.getStyle().layers;
        const labelLayer = layers.find((l) => l.type === 'symbol' && l.layout['text-field']);
        this._map.addLayer({
          id: 'lp-3d-buildings', source: 'composite', 'source-layer': 'building',
          filter: ['==', 'extrude', 'true'], type: 'fill-extrusion', minzoom: 15,
          paint: {
            'fill-extrusion-color': '#c4a882',
            'fill-extrusion-height': ['interpolate',['linear'],['zoom'],15,0,15.05,['get','height']],
            'fill-extrusion-base':   ['interpolate',['linear'],['zoom'],15,0,15.05,['get','min_height']],
            'fill-extrusion-opacity': 0.75,
          },
        }, labelLayer && labelLayer.id);
      }

      _drawRoute(geometry) {
        if (this._map.getSource('lp-route')) {
          this._map.getSource('lp-route').setData(geometry); return;
        }
        this._map.addSource('lp-route', { type: 'geojson', data: geometry });
        this._map.addLayer({ id:'lp-route-glow', type:'line', source:'lp-route',
          paint:{ 'line-color':'#ff8a00','line-width':12,'line-opacity':0.25,'line-blur':6 } });
        this._map.addLayer({ id:'lp-route-line', type:'line', source:'lp-route',
          layout:{ 'line-join':'round','line-cap':'round' },
          paint:{ 'line-color':'#ff8a00','line-width':4,'line-opacity':0.95 } });
      }

      _fitRoute(coords) {
        const bounds = coords.reduce((b,c) => b.extend(c),
          new mapboxgl.LngLatBounds(coords[0], coords[0]));
        this._map.fitBounds(bounds, { padding:80, pitch:45, bearing:0, duration:2000 });
      }

      _removeRoute() {
        if (this._map.getLayer('lp-route-glow')) this._map.removeLayer('lp-route-glow');
        if (this._map.getLayer('lp-route-line')) this._map.removeLayer('lp-route-line');
        if (this._map.getSource('lp-route'))     this._map.removeSource('lp-route');
      }

      _addTargetMarker(lngLat) {
        const el = document.createElement('div');
        el.className = 'lp-target-marker';
        this._markers.push(new mapboxgl.Marker(el).setLngLat(lngLat).addTo(this._map));
      }

      _addSocialProofMarkers(coords) {
        coords.forEach((coord, i) => {
          setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'lp-pulse-marker';
            this._markers.push(new mapboxgl.Marker(el).setLngLat(coord).addTo(this._map));
          }, i * 500);
        });
      }

      _clearOfferMarkers() {
        this._markers.forEach((m) => m.remove());
        this._markers = [];
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Helpers
    // ─────────────────────────────────────────────────────────────────────────
    const MAPBOX_TOKEN    = typeof CONFIG !== 'undefined' ? CONFIG.MAPBOX_TOKEN : 'DEIN_MAPBOX_TOKEN_HIER';
    const FALLBACK_LNGLAT = [8.6512, 49.8728];

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    function weatherInfo(code) {
      if (code === 0)  return { emoji: '☀️',  label: 'Sonnig' };
      if (code <= 3)   return { emoji: '⛅',  label: 'Bewölkt' };
      if (code <= 48)  return { emoji: '🌫️', label: 'Neblig' };
      if (code <= 55)  return { emoji: '🌦️', label: 'Nieselregen' };
      if (code <= 67)  return { emoji: '🌧️', label: 'Regen' };
      if (code <= 77)  return { emoji: '❄️',  label: 'Schnee' };
      if (code <= 82)  return { emoji: '🌦️', label: 'Schauer' };
      return                 { emoji: '⛈️',  label: 'Gewitter' };
    }

    function haversine([lng1, lat1], [lng2, lat2]) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2
              + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function resolveRow(id, text) {
      const row     = document.getElementById(id);
      const spinner = row.querySelector('.ctx-spinner');
      const check   = row.querySelector('.ctx-check');
      const value   = row.querySelector('.ctx-value');
      spinner.style.display = 'none';
      check.style.display   = 'flex';
      value.textContent     = text;
      // Trigger reflow so transition fires
      value.offsetHeight;
      value.classList.add('visible');
    }

    function buildTarget(lngLat) {
      const [lng, lat] = lngLat;
      return [lng + 0.003, lat + 0.0018];
    }

    // ─────────────────────────────────────────────────────────────────────────
    // WowEffect init
    // ─────────────────────────────────────────────────────────────────────────
    let userLngLat  = null;
    let backendOffer = null;
    let weatherTemp  = 20;
    let weatherCode  = 0;

    const wow = new WowEffect({
      container: 'map',
      mapboxToken: MAPBOX_TOKEN,
      startLngLat: FALLBACK_LNGLAT,
      onFlightComplete: async () => {
        const from = userLngLat || FALLBACK_LNGLAT;
        const to   = backendOffer?.targetLngLat ?? buildTarget(from);
        try {
          const { distance, duration } = await wow.showRoute({ from, to });
          const mins = Math.ceil(duration / 60);
          const dist = distance >= 1000
            ? (distance / 1000).toFixed(1) + ' km'
            : Math.round(distance) + ' m';
          document.getElementById('route-duration').textContent = mins + ' Min.';
          document.getElementById('route-distance').textContent = dist + ' · zu Fuß';
          document.getElementById('route-info').style.display = 'block';
        } catch(e) { console.warn('Route error:', e); }
        document.getElementById('btn-reset').style.display = 'block';
      },
    });

    // ─────────────────────────────────────────────────────────────────────────
    // Context Sensing – all checks run in parallel, UI resolves as data arrives
    // ─────────────────────────────────────────────────────────────────────────
    async function checkTime() {
      await sleep(400);
      const now  = new Date();
      const time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr';
      resolveRow('ctx-time', time);
    }

    async function checkLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolveRow('ctx-location', 'Darmstadt (Demo)');
          return resolve(FALLBACK_LNGLAT);
        }
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const lngLat = [pos.coords.longitude, pos.coords.latitude];
            // Reverse geocode → city name
            try {
              const url  = `https://api.mapbox.com/geocoding/v5/mapbox.places/${lngLat[0]},${lngLat[1]}.json?types=locality,place&limit=1&access_token=${MAPBOX_TOKEN}`;
              const res  = await fetch(url);
              const data = await res.json();
              const city = data.features[0]?.text ?? 'Unbekannt';
              resolveRow('ctx-location', city);
            } catch {
              resolveRow('ctx-location', 'Gefunden');
            }
            resolve(lngLat);
          },
          () => {
            resolveRow('ctx-location', 'Darmstadt (Demo)');
            resolve(FALLBACK_LNGLAT);
          },
          { enableHighAccuracy: true, timeout: 8000 }
        );
      });
    }

    async function checkWeather(lngLat) {
      const [lng, lat] = lngLat;
      try {
        const url  = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code`;
        const res  = await fetch(url);
        const data = await res.json();
        weatherTemp = Math.round(data.current.temperature_2m);
        weatherCode = data.current.weather_code;
        const { emoji, label } = weatherInfo(weatherCode);
        resolveRow('ctx-weather', `${weatherTemp}°C · ${emoji} ${label}`);
      } catch {
        resolveRow('ctx-weather', 'Nicht verfügbar');
      }
    }

    async function fetchOffer(lngLat) {
      try {
        const res = await fetch('/api/offer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_lng:     lngLat[0],
            user_lat:     lngLat[1],
            temperature:  weatherTemp,
            weather_code: weatherCode,
            radius_m:     50000
          })
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        console.warn('[LocalPulse] Backend nicht erreichbar:', e);
        return null;
      }
    }

    async function checkDistance(lngLat) {
      await sleep(300); // slight visual delay
      const target   = buildTarget(lngLat);
      const dist     = Math.round(haversine(lngLat, target));
      const distText = dist >= 1000 ? (dist/1000).toFixed(1) + ' km' : dist + ' m';
      resolveRow('ctx-distance', `~${distText} entfernt`);
    }

    async function runContextChecks() {
      const [lngLat] = await Promise.all([checkLocation(), checkTime()]);
      userLngLat = lngLat;
      wow.updateUserLocation(lngLat);

      // Wetter holen (setzt weatherTemp / weatherCode)
      await Promise.all([checkWeather(lngLat), checkDistance(lngLat)]);

      // Backend mit echtem Wetter aufrufen
      backendOffer = await fetchOffer(lngLat);

      if (backendOffer?.status === 'success') {
        document.getElementById('offer-title').textContent = backendOffer.offer.title;
        document.getElementById('offer-desc').textContent  = backendOffer.offer.description;
        const dist = backendOffer.distance_m;
        const distText = dist >= 1000 ? (dist/1000).toFixed(1) + ' km' : dist + ' m';
        document.querySelector('#ctx-distance .ctx-value').textContent = `~${distText} entfernt`;
      } else {
        document.getElementById('offer-title').textContent = 'Keine Angebote in der Nähe';
        document.getElementById('offer-desc').textContent  = 'Gerade haben lokale Händler keine aktiven Deals für deinen Standort.';
        document.getElementById('btn-accept').disabled = true;
      }

      await sleep(1400);
      document.getElementById('context-card').classList.add('hide');
      await sleep(400);
      document.getElementById('gen-ui-widget').classList.add('visible');
    }

    runContextChecks();

    // ─────────────────────────────────────────────────────────────────────────
    // Button wiring
    // ─────────────────────────────────────────────────────────────────────────
    document.getElementById('btn-accept').addEventListener('click', () => {
      document.getElementById('gen-ui-widget').classList.remove('visible');
      document.getElementById('gen-ui-widget').classList.add('hide');
      const from   = userLngLat || FALLBACK_LNGLAT;
      const target = backendOffer?.targetLngLat ?? buildTarget(from);
      const social = backendOffer?.social_proof_coords ?? [
        [from[0] + 0.0025, from[1] + 0.0013],
        [from[0] + 0.0035, from[1] + 0.0022],
        [from[0] + 0.0028, from[1] + 0.0008],
      ];
      wow.trigger({ targetLngLat: target, socialProofCoords: social });
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      document.getElementById('gen-ui-widget').classList.add('visible');
      document.getElementById('gen-ui-widget').classList.remove('hide');
      document.getElementById('btn-reset').style.display = 'none';
      document.getElementById('route-info').style.display = 'none';
      wow.reset();
    });
  </script>

</body>
</html>
